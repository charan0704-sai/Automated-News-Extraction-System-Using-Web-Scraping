<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ company }} - Summary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <div class="summary-container">
        <h2>{{ company }} - Article Summary</h2>

        {% if img_url %}
            <img src="{{ img_url }}" alt="Article image">
        {% endif %}

        <ul>
            {% for bullet in bullets %}
                <li>{{ bullet }}</li>
            {% endfor %}
        </ul>

        <p><a href="{{ url }}" target="_blank">Read full article</a></p>
        <p><a href="{{ url_for('home') }}">⬅ Back to Dashboard</a></p>
    </div>
</body>
</html>
