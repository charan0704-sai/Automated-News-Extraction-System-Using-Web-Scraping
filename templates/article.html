<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>{{ title }}</h1>
    </header>

    <div class="article">
        <h2>📰 Article Summary</h2>
        {% if bullets %}
        <ul>
            {% for bullet in bullets %}
            <li>{{ bullet }}</li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No summary available.</p>
        {% endif %}
    </div>
</body>
</html>
